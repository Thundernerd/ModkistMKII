# Manual release builds for macOS, Windows, and Linux.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   MODIO_API_KEY  — game API key from mod.io
#   MODIO_GAME_ID  — numeric game ID from mod.io
#   SENTRY_DSN     — optional Sentry DSN for Rust and frontend error reporting
#
# Run from Actions → Build → Run workflow. Choose which platforms to build.
# Each build sets a local prerelease version from the workflow run number
# (for example 0.1.0-34) without committing to git. Bundles appear as workflow
# artifacts (dmg/msi/deb/AppImage per platform).

name: Build

on:
  workflow_dispatch:
    inputs:
      macos:
        description: Build macOS (universal .dmg)
        type: boolean
        default: true
      windows:
        description: Build Windows (.msi)
        type: boolean
        default: true
      linux:
        description: Build Linux (.deb, AppImage)
        type: boolean
        default: true

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve prerelease version
        id: resolve
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          version=$(node .github/scripts/set-prerelease-version.mjs --print-only)
          echo "version=$version" >> "$GITHUB_OUTPUT"

  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build platform matrix
        id: set-matrix
        env:
          MACOS: ${{ inputs.macos }}
          WINDOWS: ${{ inputs.windows }}
          LINUX: ${{ inputs.linux }}
        run: |
          if [[ "$MACOS" != "true" && "$WINDOWS" != "true" && "$LINUX" != "true" ]]; then
            echo "::error::Select at least one platform to build."
            exit 1
          fi

          matrix=$(jq -nc \
            --arg macos "$MACOS" \
            --arg windows "$WINDOWS" \
            --arg linux "$LINUX" \
            '
            {include: (
              [
                (if $macos == "true" then {os:"macos-latest", platform:"macos-universal", tauri_args:"--target universal-apple-darwin"} else empty end),
                (if $windows == "true" then {os:"windows-latest", platform:"windows", tauri_args:"--bundles msi"} else empty end),
                (if $linux == "true" then {os:"ubuntu-22.04", platform:"linux", tauri_args:""} else empty end)
              ]
            )}
            ')

          {
            echo 'matrix<<EOF'
            echo "$matrix"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.platform }}
    needs: [resolve-version, prepare]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Set prerelease version
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: node .github/scripts/set-prerelease-version.mjs

      - name: Set MSI version
        if: matrix.platform == 'windows'
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: node .github/scripts/set-wix-version.mjs

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS universal targets
        if: matrix.platform == 'macos-universal'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        env:
          MODIO_API_KEY: ${{ secrets.MODIO_API_KEY }}
          MODIO_GAME_ID: ${{ secrets.MODIO_GAME_ID }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: npm run tauri build -- ${{ matrix.tauri_args }}

      - name: Upload bundles
        uses: actions/upload-artifact@v7.0.1
        with:
          name: modkist-${{ matrix.platform }}-${{ needs.resolve-version.outputs.version }}
          path: src-tauri/target/**/release/bundle/**
          if-no-files-found: error
