# Manual release builds for macOS, Windows, and Linux.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   MODIO_API_KEY  — game API key from mod.io
#   MODIO_GAME_ID  — numeric game ID from mod.io
#   SENTRY_DSN     — optional Sentry DSN for Rust and frontend error reporting
#
# Run from Actions → Build → Run workflow. Choose which platforms to build.
# The prerelease suffix is bumped automatically (0.1.0 -> 0.1.0-1 -> 0.1.0-2)
# in package.json, tauri.conf.json, Cargo.toml, and Cargo.lock, committed to the
# selected branch, then builds run.
# Bundles appear as workflow artifacts (dmg/msi/deb/AppImage per platform).

name: Build

on:
  workflow_dispatch:
    inputs:
      macos:
        description: Build macOS (universal .dmg)
        type: boolean
        default: true
      windows:
        description: Build Windows (.msi)
        type: boolean
        default: true
      linux:
        description: Build Linux (.deb, AppImage)
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Bump prerelease version
        id: bump
        run: |
          set -euo pipefail

          new_version=$(node <<'EOF'
          const fs = require("fs");

          const current = JSON.parse(fs.readFileSync("package.json", "utf8")).version;
          const match = current.match(/^(\d+\.\d+\.\d+)(?:-(\d+))?$/);
          if (!match) {
            console.error(
              `::error::Expected major.minor.patch or major.minor.patch-N, got ${current}`,
            );
            process.exit(1);
          }

          const base = match[1];
          const prerelease = match[2] ? Number(match[2]) + 1 : 1;
          const newVersion = `${base}-${prerelease}`;

          console.error(`Bumping version: ${current} -> ${newVersion}`);

          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          pkg.version = newVersion;
          fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");

          const tauri = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
          tauri.version = newVersion;
          fs.writeFileSync("src-tauri/tauri.conf.json", JSON.stringify(tauri, null, 2) + "\n");

          const cargoTomlPath = "src-tauri/Cargo.toml";
          const cargoToml = fs.readFileSync(cargoTomlPath, "utf8");
          fs.writeFileSync(
            cargoTomlPath,
            cargoToml.replace(/^version = ".*"$/m, `version = "${newVersion}"`),
          );

          const cargoLockPath = "src-tauri/Cargo.lock";
          const cargoLock = fs.readFileSync(cargoLockPath, "utf8").split("\n");
          let seenPackage = false;
          const updatedLock = cargoLock
            .map((line) => {
              if (line === 'name = "modkistmkii"') {
                seenPackage = true;
                return line;
              }
              if (seenPackage && line.startsWith('version = "')) {
                seenPackage = false;
                return `version = "${newVersion}"`;
              }
              return line;
            })
            .join("\n");
          fs.writeFileSync(cargoLockPath, updatedLock);

          process.stdout.write(newVersion);
          EOF
          )

          echo "version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        id: commit
        run: |
          set -euo pipefail

          if git diff --quiet -- package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock; then
            echo "::error::Version bump produced no changes."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          git commit -m "chore(release): bump prerelease version to ${{ steps.bump.outputs.version }}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push version bump
        run: git push

  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build platform matrix
        id: set-matrix
        env:
          MACOS: ${{ inputs.macos }}
          WINDOWS: ${{ inputs.windows }}
          LINUX: ${{ inputs.linux }}
        run: |
          if [[ "$MACOS" != "true" && "$WINDOWS" != "true" && "$LINUX" != "true" ]]; then
            echo "::error::Select at least one platform to build."
            exit 1
          fi

          matrix=$(jq -nc \
            --arg macos "$MACOS" \
            --arg windows "$WINDOWS" \
            --arg linux "$LINUX" \
            '
            {include: (
              [
                (if $macos == "true" then {os:"macos-latest", platform:"macos-universal", tauri_args:"--target universal-apple-darwin"} else empty end),
                (if $windows == "true" then {os:"windows-latest", platform:"windows", tauri_args:"--bundles msi"} else empty end),
                (if $linux == "true" then {os:"ubuntu-22.04", platform:"linux", tauri_args:""} else empty end)
              ]
            )}
            ')

          {
            echo 'matrix<<EOF'
            echo "$matrix"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.platform }}
    needs: [bump-version, prepare]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.bump-version.outputs.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS universal targets
        if: matrix.platform == 'macos-universal'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        env:
          MODIO_API_KEY: ${{ secrets.MODIO_API_KEY }}
          MODIO_GAME_ID: ${{ secrets.MODIO_GAME_ID }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: npm run tauri build -- ${{ matrix.tauri_args }}

      - name: Upload bundles
        uses: actions/upload-artifact@v7.0.1
        with:
          name: modkist-${{ matrix.platform }}-${{ needs.bump-version.outputs.version }}
          path: src-tauri/target/**/release/bundle/**
          if-no-files-found: error
