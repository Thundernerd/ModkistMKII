# Manual release builds for macOS, Windows, and Linux.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   MODIO_API_KEY  — game API key from mod.io
#   MODIO_GAME_ID  — numeric game ID from mod.io
#
# Run from Actions → Build → Run workflow. Choose which platforms to build.
# Bundles appear as workflow artifacts (dmg/msi/deb/AppImage per platform).

name: Build

on:
  workflow_dispatch:
    inputs:
      macos:
        description: Build macOS (universal .dmg)
        type: boolean
        default: true
      windows:
        description: Build Windows (.msi)
        type: boolean
        default: true
      linux:
        description: Build Linux (.deb, AppImage)
        type: boolean
        default: true

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Require at least one platform
        if: ${{ !inputs.macos && !inputs.windows && !inputs.linux }}
        run: |
          echo "::error::Select at least one platform to build."
          exit 1

  build:
    name: ${{ matrix.platform }}
    needs: validate
    if: ${{ matrix.build }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-universal
            tauri_args: --target universal-apple-darwin
            build: ${{ inputs.macos }}
          - os: windows-latest
            platform: windows
            tauri_args: --bundles msi
            build: ${{ inputs.windows }}
          - os: ubuntu-22.04
            platform: linux
            tauri_args: ""
            build: ${{ inputs.linux }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS universal targets
        if: matrix.platform == 'macos-universal'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        env:
          MODIO_API_KEY: ${{ secrets.MODIO_API_KEY }}
          MODIO_GAME_ID: ${{ secrets.MODIO_GAME_ID }}
        run: npm run tauri build -- ${{ matrix.tauri_args }}

      - name: Upload bundles
        uses: actions/upload-artifact@v7.0.1
        with:
          name: modkist-${{ matrix.platform }}
          path: src-tauri/target/**/release/bundle/**
          if-no-files-found: error
